spring.application.name=campus-runner-backend

server.port=${SERVER_PORT:8080}

# Default to the local MySQL database used by the project; override with SPRING_DATASOURCE_* if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/campus_runner_board?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Zrl20040812**}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.sql.init.mode=always
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.auth.jwt-secret=${JWT_SECRET:campus-runner-board-jwt-secret-change-me-in-production}
app.auth.jwt-expire-hours=${JWT_EXPIRE_HOURS:72}

app.upload.base-dir=${UPLOAD_BASE_DIR:./uploads}
app.upload.avatar-dir=${UPLOAD_AVATAR_DIR:./uploads/avatars}
app.upload.avatar-url-prefix=${UPLOAD_AVATAR_URL_PREFIX:/uploads/avatars/}
app.upload.avatar-max-size=${UPLOAD_AVATAR_MAX_SIZE:5242880}
app.upload.order-image-dir=${UPLOAD_ORDER_IMAGE_DIR:./uploads/order-images}
app.upload.order-image-url-prefix=${UPLOAD_ORDER_IMAGE_URL_PREFIX:/uploads/order-images/}
app.upload.order-image-max-size=${UPLOAD_ORDER_IMAGE_MAX_SIZE:8388608}
app.upload.chat-image-dir=${UPLOAD_CHAT_IMAGE_DIR:./uploads/chat-images}
app.upload.chat-image-url-prefix=${UPLOAD_CHAT_IMAGE_URL_PREFIX:/uploads/chat-images/}
app.upload.chat-image-max-size=${UPLOAD_CHAT_IMAGE_MAX_SIZE:8388608}

spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:10MB}
