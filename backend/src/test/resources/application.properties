# ---------- 测试数据源（内存数据库） ----------
spring.datasource.url=jdbc:h2:mem:campus_runner_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---------- 测试环境持久层 ----------
spring.sql.init.mode=always

# ---------- 测试环境跨域（与前端开发地址保持一致） ----------
app.cors.allowed-origins=http://localhost:5173

# ---------- 测试环境认证 ----------
app.auth.jwt-secret=test-only-jwt-secret
app.auth.jwt-expire-hours=24
